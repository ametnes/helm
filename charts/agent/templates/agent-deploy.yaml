{{- if .Values.agent }}
{{- $ReleaseService := .Release.Service -}}
{{- $ReleaseNamespace := .Release.Namespace -}}
{{- with .Values.agent }}
{{- $tls := default dict .tls -}}
{{- $trust := default dict $tls.trust -}}
{{- $trustEnabled := default false $trust.enabled -}}
{{- $additionalCAs := default list $trust.additionalCAs -}}
{{- $hasInlineCerts := false -}}
{{- range $additionalCAs }}
  {{- if .crt }}
    {{- $hasInlineCerts = true -}}
  {{- end }}
{{- end }}
{{- $secretCfg := default dict $trust.secret -}}
{{- /* `default true` treats boolean false as empty in Sprig; use hasKey for secret.create. */ -}}
{{- $shouldCreate := true -}}
{{- if and $secretCfg (hasKey $secretCfg "create") -}}
  {{- $shouldCreate = $secretCfg.create -}}
{{- end -}}
{{- /* Existing Secret: create false, or no inline PEMs while secret.name is set. */ -}}
{{- $useExistingSecret := and $secretCfg $secretCfg.name (or (not $shouldCreate) (not $hasInlineCerts)) -}}
{{- $TlsTrustActive := and $trustEnabled (or (and $hasInlineCerts $shouldCreate) $useExistingSecret) -}}
{{- $TlsSecretName := "" -}}
{{- if $TlsTrustActive }}
  {{- if and $hasInlineCerts $shouldCreate }}
    {{- $TlsSecretName = default (printf "%s-tls-trust" (include "cloud-agent.fullname" $)) $secretCfg.name }}
  {{- else if $useExistingSecret }}
    {{- $TlsSecretName = $secretCfg.name }}
  {{- end }}
{{- end }}
{{- $trustInitImage := default "curlimages/curl:8.11.1" $trust.initImage -}}
{{- $trustTargetBundle := default "/etc/ssl/certs/ca-certificates.crt" $trust.targetBundlePath -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloud-agent.fullname" $ }}
  namespace: {{ $ReleaseNamespace }}
  labels:
    app.kubernetes.io/managed-by: {{ $ReleaseService }}
    {{- with .labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not .autoscaling.enabled }}
  replicas: {{ .replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- with .selectorLabels }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
  template:
    metadata:
      annotations:
        {{- if .config }}
        checksum/config: {{ sha256sum (toYaml .config) }}
        {{- end }}
        {{- if and $TlsTrustActive $TlsSecretName }}
        checksum/tls-trust: {{ sha256sum (toYaml $trust) }}
        {{- end }}
      {{- with .podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
      {{- with .selectorLabels }}
      {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .serviceAccount .serviceAccount.name }}
      serviceAccountName: {{ .serviceAccount.name }}
      {{- end }}
      securityContext:
        {{- toYaml .podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-memcached
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z {{ include "cloud-agent.memcachedService" $ }}.{{ $.Release.Namespace }}.svc.cluster.local 11211; do echo waiting for memcached; sleep 2; done; echo memcached is ready;']
          securityContext:
            runAsUser: 1000
        {{- if and $TlsTrustActive $TlsSecretName }}
        - name: build-ca-bundle
          image: {{ $trustInitImage | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              BUNDLE=""
              for f in /cacert.pem /etc/ssl/certs/ca-certificates.crt /etc/pki/tls/certs/ca-bundle.crt /etc/ssl/certs/ca-bundle.crt; do
                if [ -f "$f" ] && [ -s "$f" ]; then
                  BUNDLE="$f"
                  break
                fi
              done
              if [ -z "$BUNDLE" ]; then
                echo "tls.trust: no system CA bundle found (tried /cacert.pem, Debian/Ubuntu, RHEL paths). Set agent.tls.trust.initImage (default curlimages/curl)." >&2
                exit 1
              fi
              cp "$BUNDLE" /work/ca-certificates.crt
              if ls /customer/* 1>/dev/null 2>&1; then
                for f in /customer/*; do
                  [ -f "$f" ] && cat "$f" >> /work/ca-certificates.crt
                done
              fi
          volumeMounts:
            - name: ca-store
              mountPath: /work
            - name: customer-ca
              mountPath: /customer
              readOnly: true
        {{- end }}
        {{- if .extraInitContainers }}
        {{- with .extraInitContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- end }}
      containers:
        - name: agent
          securityContext:
            {{- toYaml .securityContext | nindent 12 }}
          image: "{{ .image.repository }}:{{ .image.tag }}"
          args:
            {{- if .config }}
            - --config
            - /app/config/config.json
            {{- end }}
          imagePullPolicy: {{ .image.pullPolicy }}
          resources:
            {{- toYaml .resources | nindent 12 }}
          env:
            - name: AMETNES_AGENT_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            {{- if .clientCertSecret }}
            - name: WORKER_CERT_KEY
              value: "/app/secrets/client.key"
            - name: WORKER_CERT
              value: "/app/secrets/client.crt"
            - name: WORKER_CA_CERT
              value: "/app/secrets/ca.crt"
            {{- end }}
            {{- if .extraEnvs }}
            {{- with .extraEnvs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- end }}
          volumeMounts:
            {{- if .clientCertSecret }}
            - name: tls
              mountPath: /app/secrets/client.crt
              subPath: client.crt
              readOnly: true
            - name: tls
              mountPath: /app/secrets/client.key
              subPath: client.key
              readOnly: true
            - name: tls
              mountPath: /app/secrets/ca.crt
              subPath: ca.crt
              readOnly: true
            {{- end }}
            {{- if .extraVolumeMounts }}
            {{- with .extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- end }}
            {{- if and $TlsTrustActive $TlsSecretName }}
            - name: ca-store
              mountPath: {{ $trustTargetBundle | quote }}
              subPath: ca-certificates.crt
              readOnly: true
            {{- end }}
            - mountPath: /app/config/config.json
              name: service-config
              readOnly: true
              subPath: config.json
            {{- if .lbconfig }}
            - mountPath: /app/config/lb-config.json
              name: lb-config
              readOnly: true
              subPath: lb-config.json
            {{- end }}
          {{- if .livenessProbe }}
          {{- if .livenessProbe.enabled }}
          livenessProbe:
            {{- if .livenessProbe.exec }}
            exec:
              {{- toYaml .livenessProbe.exec | nindent 14 }}
            {{- end }}
            {{- if .livenessProbe.initialDelaySeconds }}
            initialDelaySeconds: {{ .livenessProbe.initialDelaySeconds }}
            {{- end }}
            {{- if .livenessProbe.periodSeconds }}
            periodSeconds: {{ .livenessProbe.periodSeconds }}
            {{- end }}
            {{- if .livenessProbe.timeoutSeconds }}
            timeoutSeconds: {{ .livenessProbe.timeoutSeconds }}
            {{- end }}
            {{- if .livenessProbe.successThreshold }}
            successThreshold: {{ .livenessProbe.successThreshold }}
            {{- end }}
            {{- if .livenessProbe.failureThreshold }}
            failureThreshold: {{ .livenessProbe.failureThreshold }}
            {{- end }}
          {{- end }}
          {{- end }}
      volumes:
      {{- if .clientCertSecret }}
        - name: tls
          secret:
            secretName: {{ .clientCertSecret }}
            items:
              - key: client.key
                path: client.key
              - key: client.crt
                path: client.crt
              - key: ca.crt
                path: ca.crt
      {{- end }}
      {{- if .extraVolumes }}
      {{- with .extraVolumes }}
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- if and $TlsTrustActive $TlsSecretName }}
        - name: ca-store
          emptyDir: {}
        - name: customer-ca
          secret:
            secretName: {{ $TlsSecretName }}
      {{- end }}
        - name: service-config
          configMap:
      {{- if .config.name }}
            name: {{ .config.name }}
      {{ else }}
            name: {{ include "cloud-agent.fullname" $ }}
      {{- end }}
            items:
              - key: config.json
                path: config.json
      {{- if .lbconfig }}
        - name: lb-config
          configMap:
            name: {{ .lbconfig }}
            optional: true
            items:
              - key: lb-config.json
                path: lb-config.json
      {{- end }}
      {{- with .nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
