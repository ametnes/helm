{{- if .Values.agent }}
{{- $ReleaseNamespace := .Release.Namespace -}}
{{- with .Values.agent }}
{{- $tls := default dict .tls -}}
{{- $trust := default dict $tls.trust -}}
{{- $additionalCAs := default list $trust.additionalCAs -}}
{{- $hasInlineCerts := false -}}
{{- range $additionalCAs }}
  {{- if .crt }}
    {{- $hasInlineCerts = true -}}
  {{- end }}
{{- end }}
{{- $secretCfg := default dict $trust.secret -}}
{{- $shouldCreate := default true $secretCfg.create -}}
{{- if and $hasInlineCerts $shouldCreate }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ default (printf "%s-tls-trust" (include "cloud-agent.fullname" $)) $secretCfg.name }}
  namespace: {{ $ReleaseNamespace }}
  labels:
    {{- with .labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
type: Opaque
stringData:
{{- range $i, $ca := $additionalCAs }}
  {{- if $ca.crt }}
  ca-{{ $i }}.crt: |
{{ $ca.crt | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
